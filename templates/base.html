{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Chocolate Shed</title>
    <meta name = "description" content ="Chocolate workshops for children, families and adults in the heart of Warwickshire">
    <meta name = "keywords" content ="chocolate workshop, learn a skill, craft workshop ">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!--Favicon generated by favicon.io-->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'favicon/favicon-16x16.png' %}">

    <!--custom style sheet-->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body class ="d-flex flex-column min-vh-100">
    <!-- Navigation-->

    <!-- hero image-->

    <!-- main block content-->
    {% block content %}
    {% endblock content % }

    <!--footer-->
    <footer class="mt-auto footer container-fluid">
        <div class="row align-items-center">
            <div class="text-center">
                        <a href="https://www.instagram.com" target="_blank"
                            aria-label="Visit my Instagram page (opens in a new tab)" rel="noopener"><i
                                class="fa-brands fa-square-instagram"></i></a>
                        <a href="https://www.facebook.com" target="_blank"
                            aria-label="Visit my Facebook page (opens in a new tab)" rel="noopener"><i
                                class="fa-brands fa-square-facebook"></i></a>
                        <a href="https://www.tiktok.com" target="_blank"
                            aria-label="Visit my TikTok profile (opens in a new tab)" rel="noopener"><i
                                class="fa-brands fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

<!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <!-- Font Awesome kit -->
    <script src="https://kit.fontawesome.com/24174e6ffa.js" crossorigin="anonymous"></script>

    <!-- JavaScript code-->
    <script src="{% static 'js/script.js' %}"></script>

    {% block extra_scripts %}
    {% endblock extra_scripts %}
</body>

</html>
